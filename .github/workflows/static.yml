name: Minificar e Fazer Deploy no GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar minificadores
        run: python -m pip install rjsmin==1.2.5 csscompressor==0.9.5 htmlmin==0.1.12

      - name: Preparar e minificar arquivos
        run: python .github/scripts/minify_static.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload apenas da pasta minificada
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Fazer deploy do site
        id: deployment
        uses: actions/deploy-pages@v5
