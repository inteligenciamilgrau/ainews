<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timeline de IA</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.5.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
  <header class="topbar">
    <div class="topbar-inner">
      <p class="eyebrow">AI release tracker</p>
      <h1>Timeline dos principais modelos de IA</h1>
      <p id="lastUpdated" class="last-updated">Carregando ultima atualizacao...</p>
    </div>
  </header>

    <main>
      <section class="summary-grid" aria-label="Resumo">
        <div class="metric">
          <span id="metricModels">0</span>
          <small>modelos filtrados</small>
        </div>
        <div class="metric">
          <span id="metricCompanies">0</span>
          <small>empresas</small>
        </div>
        <div class="metric">
          <span id="metricYears">-</span>
          <small>periodo</small>
        </div>
        <div class="metric">
          <span id="metricSources">0</span>
          <small>fontes oficiais</small>
        </div>
      </section>

      <section class="controls" aria-label="Filtros">
        <label>
          <span>Busca</span>
          <input id="searchInput" type="search" placeholder="modelo, familia, descricao">
        </label>
        <label>
          <span>Tipo de IA</span>
          <select id="aiCategoryFilter"></select>
        </label>
        <label>
          <span>Empresa</span>
          <select id="companyFilter"></select>
        </label>
        <label>
          <span>Tipo</span>
          <select id="typeFilter"></select>
        </label>
        <label>
          <span>Familia</span>
          <select id="familyFilter"></select>
        </label>
        <label>
          <span>Ano</span>
          <select id="yearFilter"></select>
        </label>
        <label>
          <span>Ano inicial</span>
          <select id="yearStartFilter"></select>
        </label>
        <label>
          <span>Ano final</span>
          <select id="yearEndFilter"></select>
        </label>
      </section>

      <section class="view-row" aria-label="Modo de visualizacao">
        <div class="segmented" role="tablist" aria-label="Views">
          <button class="active" type="button" data-view="timeline">Timeline</button>
          <button type="button" data-view="years">Ano a ano</button>
          <button type="button" data-view="map">Mapa</button>
          <button type="button" data-view="table">Tabela</button>
          <button type="button" data-view="sources">Fontes</button>
        </div>
        <div class="segmented compact" role="group" aria-label="Agrupamento">
          <button class="active" type="button" data-lane-mode="company">Por empresa</button>
          <button type="button" data-lane-mode="all">Tudo junto</button>
        </div>
      </section>

      <section id="timelineView" class="view active-view">
        <div id="timelineScale" class="timeline-scale"></div>
        <div id="timeline" class="timeline"></div>
        <aside id="modelDetails" class="details-panel" aria-live="polite"></aside>
      </section>

      <section id="yearsView" class="view">
        <div id="yearChart" class="year-chart"></div>
      </section>

      <section id="mapView" class="view">
        <div class="map-shell">
          <div class="map-toolbar">
            <div>
              <p class="section-kicker">Mapa</p>
              <h2>Empresas e infraestrutura de IA no mundo</h2>
            </div>
            <div class="map-actions">
              <div class="map-control-group" aria-label="Pontos exibidos">
                <button type="button" data-map-layer="companies">Sedes</button>
                <button type="button" data-map-layer="labs">Labs IA</button>
                <button type="button" data-map-layer="datacenters">Data centers</button>
                <button type="button" data-map-layer="all">Tudo</button>
              </div>
              <div class="map-control-group" aria-label="Camada base do mapa">
                <button type="button" data-map-base="map">Mapa</button>
                <button type="button" data-map-base="earth">Terra</button>
                <button type="button" data-map-base="hybrid">Hibrido</button>
              </div>
              <div class="map-control-group" aria-label="Nomes de cidades e paises">
                <button type="button" data-map-labels="off">Nomes off</button>
                <button type="button" data-map-labels="on">Nomes on</button>
              </div>
              <div class="map-scale-toggle" aria-label="Escala de visualizacao">
                <button type="button" data-map-scale="globe">Globo</button>
                <button type="button" data-map-scale="country">Pais</button>
                <button type="button" data-map-scale="city">Cidade</button>
                <button type="button" data-map-scale="street">Rua</button>
              </div>
              <div id="mapSummary" class="map-summary"></div>
            </div>
          </div>
          <div class="map-layout">
            <div class="map-stage">
              <div id="companyMap" class="company-map" aria-label="Mapa mundial interativo de empresas, labs e infraestrutura de IA"></div>
              <div class="map-corner map-corner-tl"></div>
              <div class="map-corner map-corner-tr"></div>
              <div class="map-corner map-corner-bl"></div>
              <div class="map-corner map-corner-br"></div>
              <div id="mapLoading" class="map-loading">Carregando mapa</div>
              <div id="mapError" class="map-error" hidden></div>
            </div>
            <aside id="companyLocationList" class="company-location-list" aria-label="Lista de pontos no mapa"></aside>
          </div>
        </div>
      </section>

      <section id="tableView" class="view">
        <div class="table-toolbar">
          <label>
            <span>Ordem da data</span>
            <select id="tableDateOrder">
              <option value="desc">Mais recentes</option>
              <option value="asc">Mais antigas</option>
            </select>
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Empresa</th>
                <th>Modelo</th>
                <th>Familia</th>
                <th>Tipo de IA</th>
                <th>Tipo</th>
                <th>Descricao</th>
                <th>Fonte</th>
              </tr>
            </thead>
            <tbody id="modelsTable"></tbody>
          </table>
        </div>
      </section>

      <section id="sourcesView" class="view">
        <div id="sourcesList" class="sources-list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.5.0/dist/maplibre-gl.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
